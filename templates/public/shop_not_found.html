{% extends "base.html" %}

{% block title %}Shop Not Found{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle fa-5x text-warning"></i>
                    </div>
                    
                    <h2 class="fw-bold mb-3">Shop Not Found</h2>
                    <p class="text-muted mb-4">The shop you're looking for doesn't exist or is currently inactive.</p>

                    <a href="{{ url_for('main.home') }}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Go to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
